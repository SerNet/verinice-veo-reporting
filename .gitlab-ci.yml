image: eclipse-temurin:25.0.1_8-jdk@sha256:42fc3fe6804ec612f5ef8a613f8c06d8dd578de6207336077387d4cb32edaa9b

variables:
  ORG_GRADLE_PROJECT_ci: 'true'

# Verification (code analysis) is unnecessary on 'develop' &
# 'master', because only verified MRs can be merged into those branches.
# For the test coverage, we do need to run tests on develop though
.test_coverage:
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: never
    - when: on_success

.other_checks:
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: never
    - if: $CI_COMMIT_BRANCH == "develop"
      when: never
    - when: on_success

stages:
  - build
  - check
  - docker_image
  - deployment

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
      when: never
    - when: always

before_script:
  - GRADLE_USER_HOME="$(pwd)/.gradle"
  - export GRADLE_USER_HOME

build:
  stage: build
  rules:
    - when: on_success
  variables:
    IMAGE_NAME: eu.gcr.io/veo-projekt/veo-reporting
    GOOGLE_APPLICATION_CREDENTIALS: $GCR_ACCESS_TOKEN
  script:
    - env
    - |-
      ADDITIONAL_TAGS="pipeline-id-${CI_PIPELINE_ID}"
      if grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' <<<$CI_COMMIT_TAG; then
        ADDITIONAL_TAGS="$ADDITIONAL_TAGS,$CI_COMMIT_TAG"
        apt-get update && apt-get -y install git
        git fetch --tags
        LATEST_TAG=$(git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
        if [ "$CI_COMMIT_TAG" = "$LATEST_TAG" ]; then
          ADDITIONAL_TAGS="$ADDITIONAL_TAGS,latest"
        fi
      fi
      if [ "$CI_COMMIT_REF_NAME" = "develop" ]; then export ADDITIONAL_TAGS="$ADDITIONAL_TAGS,develop"; fi;
    - ./gradlew -i -PciBuildNumber=$CI_PIPELINE_ID -PciJobName=$CI_PROJECT_NAME/$CI_COMMIT_REF_NAME -PciCommitId=$CI_COMMIT_SHA jib -Djib.console=plain -Djib.to.image="$IMAGE_NAME:gitlab-git-${CI_COMMIT_SHA}" -Djib.to.tags="$ADDITIONAL_TAGS"
  interruptible: true
  cache:
    - key: gradle
      paths:
        - .gradle
    - key: $CI_PROJECT_PATH
      paths:
        - build
      policy: push

test:
  stage: check
  rules:
    - !reference [ .test_coverage, rules ]
  script:
    - ./gradlew -i test jacocoTestReport
    - |
      TOTAL=$(grep -o '<counter type="INSTRUCTION" [^>]*/>' build/reports/jacoco/test/jacocoTestReport.xml | tail -n 1 | awk -F'[=" ]+' '{for(i=1;i<=NF;i++){if($i=="missed")m=$(i+1); if($i=="covered")c=$(i+1)} printf "%.2f%%\n", (c/(m+c))*100}')
      echo "Total Project Coverage: $TOTAL%"
  coverage: '/Total Project Coverage: (\d+\.\d+%)/'
  interruptible: true
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/**/TEST-*.xml
      coverage_report:
        coverage_format: jacoco
        path: 'build/reports/jacoco/test/jacocoTestReport.xml'

  cache:
    - key: gradle
      paths:
        - .gradle
    - key: $CI_PROJECT_PATH
      paths:
        - build
      policy: pull

check:
  stage: check
  rules:
    - !reference [ .other_checks, rules ]
  interruptible: true
  script:
    - ./gradlew -i check -x test
  cache:
    - key: gradle
      paths:
        - .gradle
    - key: $CI_PROJECT_PATH
      paths:
        - build
      policy: pull

update-values:
  stage: deployment
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      variables:
        VALUES_FILE: 'dev-values.yaml'
        IMAGE_TAG: 'gitlab-git-${CI_COMMIT_SHA}'
    - if: '$CI_COMMIT_TAG'
      variables:
        VALUES_FILE: 'stage-values.yaml'
        IMAGE_TAG: '${CI_COMMIT_TAG}'
    - when: never
  trigger:
    project: veo/verinice-veo-argocd
    branch: main
    strategy: mirror
    inputs:
      valuesFile: $VALUES_FILE
      imageTag: $IMAGE_TAG
      serviceName: 'reporting'

trigger_deployment:
  stage: deployment
  only:
    - develop
    - tags
  trigger:
    project: veo/verinice-veo-deployment
